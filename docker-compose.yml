services:
  mysql:
    image: mysql:8.0
    container_name: sqlterm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - sqlterm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: sqlterm-postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - sqlterm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlite:
    image: alpine:latest
    container_name: sqlterm-sqlite
    volumes:
      - sqlite_data:/data
      - ./docker/sqlite:/init
    networks:
      - sqlterm-network
    command: >
      sh -c "
        apk add --no-cache sqlite &&
        chmod +x /init/create_db.sh &&
        /init/create_db.sh &&
        tail -f /dev/null
      "

  bastion:
    build:
      context: .
      dockerfile: docker/bastion/Dockerfile
    container_name: sqlterm-bastion
    ports:
      - "2222:22"
    volumes:
      - ./target/release/sqlterm:/usr/local/bin/sqlterm:ro
      - ./docker/bastion/ssh_keys:/etc/ssh/keys:ro
      - sqlite_data:/data:ro
    networks:
      - sqlterm-network
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      sqlite:
        condition: service_started
    environment:
      - SSH_ENABLE_PASSWORD_AUTH=true
      - SSH_USERS=sqlterm:1000:1000

volumes:
  mysql_data:
  postgres_data:
  sqlite_data:

networks:
  sqlterm-network:
    driver: bridge
